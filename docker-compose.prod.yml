services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gameapp}
      POSTGRES_USER: ${DB_USERNAME:-gameapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env.prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    ports:
      - "5432:5432"


  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_net

  backend:
    build:
      context: ./gameBackend
      dockerfile: Dockerfile.runtime
      args:
        BACKEND_RUNTIME_BASE_IMAGE: ${BACKEND_RUNTIME_BASE_IMAGE:-docker.arvancloud.ir/eclipse-temurin:17-jre-jammy}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      JAVA_OPTS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
      APP_VERSION: ${APP_VERSION:-1.0.0}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-gameapp}
      DB_USERNAME: ${DB_USERNAME:-gameapp}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env.prod}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.prod}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-2592000000}
      ALLOWED_ORIGINS: https://${APP_DOMAIN:?set APP_DOMAIN in .env.prod}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_REQUIRE_HEALTHY: ${REDIS_REQUIRE_HEALTHY:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FF_REDIS_ENABLED: ${FF_REDIS_ENABLED:-true}
      FF_REDIS_SESSION_PRESENCE_ENABLED: ${FF_REDIS_SESSION_PRESENCE_ENABLED:-true}
      FF_REDIS_IDEMPOTENCY_ENABLED: ${FF_REDIS_IDEMPOTENCY_ENABLED:-false}
      FF_REDIS_RATE_LIMIT_ENABLED: ${FF_REDIS_RATE_LIMIT_ENABLED:-false}
      FF_REDIS_PUB_SUB_ENABLED: ${FF_REDIS_PUB_SUB_ENABLED:-true}
      FF_REDIS_ROOM_ACTION_LOCK_ENABLED: ${FF_REDIS_ROOM_ACTION_LOCK_ENABLED:-false}
      PAYMENT_CALLBACK_BASE_URL: https://${APP_DOMAIN:?set APP_DOMAIN in .env.prod}
      OXAPAY_CALLBACK_BASE_URL: https://${APP_DOMAIN:?set APP_DOMAIN in .env.prod}
      REFERRAL_BASE_URL: https://${APP_DOMAIN:?set APP_DOMAIN in .env.prod}
      GEOIP_ENABLED: ${GEOIP_ENABLED:-false}
      WS_MIN_SUPPORTED_APP_VERSION: ${WS_MIN_SUPPORTED_APP_VERSION:-3.0.0}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "127.0.0.1:${HOST_BACKEND_PORT:-18080}:8080"
    networks:
      - app_net

  frontend:
    build:
      context: ./gameweb
      dockerfile: Dockerfile.runtime
      args:
        FRONTEND_RUNTIME_BASE_IMAGE: ${FRONTEND_RUNTIME_BASE_IMAGE:-docker.arvancloud.ir/nginx:1.27-alpine}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${HOST_FRONTEND_PORT:-18081}:80"
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
