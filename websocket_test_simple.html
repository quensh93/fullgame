<!DOCTYPE html>
<html>
<head>
    <title>Simple WebSocket Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .log { background: #f5f5f5; padding: 10px; height: 300px; overflow-y: scroll; border: 1px solid #ddd; }
        button { margin: 5px; padding: 8px 15px; cursor: pointer; }
        input { margin: 5px; padding: 5px; width: 200px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .connected { background: #d4edda; color: #155724; }
        .disconnected { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Simple WebSocket Test</h1>
        
        <div class="section">
            <h3>Connection</h3>
            <button onclick="connect()">Connect</button>
            <button onclick="disconnect()">Disconnect</button>
            <div id="status" class="status disconnected">Disconnected</div>
        </div>

        <div class="section">
            <h3>Game Actions</h3>
            <div>
                <h4>RPS Game (Room 34, Game State 25)</h4>
                <button onclick="sendRPSChoice('ROCK')">Rock</button>
                <button onclick="sendRPSChoice('PAPER')">Paper</button>
                <button onclick="sendRPSChoice('SCISSORS')">Scissors</button>
            </div>
            
            <div>
                <h4>End Game</h4>
                <button onclick="endGame()">End Game (Player 60 wins)</button>
            </div>
        </div>

        <div class="section">
            <h3>Messages</h3>
            <div id="log" class="log"></div>
            <button onclick="clearLog()">Clear Log</button>
        </div>
    </div>

    <script>
        let socket = null;
        let isConnected = false;

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus() {
            const statusDiv = document.getElementById('status');
            if (isConnected) {
                statusDiv.className = 'status connected';
                statusDiv.textContent = 'Connected';
            } else {
                statusDiv.className = 'status disconnected';
                statusDiv.textContent = 'Disconnected';
            }
        }

        function connect() {
            try {
                socket = new WebSocket('ws://localhost:8080/ws/websocket');
                
                socket.onopen = function(event) {
                    isConnected = true;
                    updateStatus();
                    log('Connected to WebSocket');
                };
                
                socket.onmessage = function(event) {
                    log('Received: ' + event.data);
                };
                
                socket.onclose = function(event) {
                    isConnected = false;
                    updateStatus();
                    log('Disconnected from WebSocket');
                };
                
                socket.onerror = function(error) {
                    log('WebSocket Error: ' + error);
                };
                
            } catch (error) {
                log('Connection Error: ' + error);
            }
        }

        function disconnect() {
            if (socket) {
                socket.close();
            }
        }

        function sendMessage(action, data) {
            if (!isConnected) {
                log('Not connected to WebSocket');
                return;
            }
            
            const message = {
                action: action,
                roomId: 34,
                data: data
            };
            
            socket.send(JSON.stringify(message));
            log('Sent: ' + JSON.stringify(message));
        }

        function sendRPSChoice(choice) {
            sendMessage('RPS_CHOICE', {
                choice: choice,
                playerId: 60,
                gameStateId: 25
            });
        }

        function endGame() {
            sendMessage('END_GAME', {
                gameStateId: 25,
                gameResults: {
                    winners: [60],
                    losers: [61]
                }
            });
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // Auto-connect on page load
        window.onload = function() {
            setTimeout(connect, 1000);
        };
    </script>
</body>
</html>
