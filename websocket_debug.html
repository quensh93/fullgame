<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Debug Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .log { background: #f5f5f5; padding: 10px; height: 400px; overflow-y: scroll; border: 1px solid #ddd; font-family: monospace; font-size: 12px; }
        button { margin: 5px; padding: 8px 15px; cursor: pointer; }
        input { margin: 5px; padding: 5px; width: 200px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .connected { background: #d4edda; color: #155724; }
        .disconnected { background: #f8d7da; color: #721c24; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WebSocket Debug Tool</h1>
        
        <div class="section">
            <h3>Connection</h3>
            <button onclick="connect()">Connect to WebSocket</button>
            <button onclick="disconnect()">Disconnect</button>
            <div id="status" class="status disconnected">Disconnected</div>
        </div>

        <div class="section">
            <h3>Room Subscriptions</h3>
            <button onclick="subscribeToHokmRooms()">Subscribe to HOKM Rooms</button>
            <button onclick="subscribeToGameRoom()">Subscribe to Game Room</button>
            <input type="number" id="roomId" placeholder="Room ID" value="40">
            <button onclick="sendTestMessage()">Send Test Message</button>
        </div>

        <div class="section">
            <h3>Manual Testing</h3>
            <button onclick="addUserToRoom()">Add User to Room 40</button>
            <button onclick="createNewRoom()">Create New Room</button>
            <button onclick="getRoomInfo()">Get Room Info</button>
        </div>

        <div class="section">
            <h3>Messages Log</h3>
            <div id="log" class="log"></div>
            <button onclick="clearLog()">Clear Log</button>
        </div>
    </div>

    <script>
        let stompClient = null;
        let connected = false;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus() {
            const statusDiv = document.getElementById('status');
            if (connected) {
                statusDiv.className = 'status connected';
                statusDiv.textContent = 'Connected';
            } else {
                statusDiv.className = 'status disconnected';
                statusDiv.textContent = 'Disconnected';
            }
        }

        function connect() {
            try {
                const socket = new SockJS('http://localhost:8080/ws');
                stompClient = Stomp.over(socket);
                
                stompClient.connect({}, function (frame) {
                    console.log('Connected: ' + frame);
                    connected = true;
                    updateStatus();
                    log('Connected to WebSocket successfully', 'success');
                }, function (error) {
                    console.log('Error: ' + error);
                    log('Error connecting: ' + error, 'error');
                });
            } catch (error) {
                log('Connection Error: ' + error, 'error');
            }
        }

        function disconnect() {
            if (stompClient) {
                stompClient.disconnect();
                connected = false;
                updateStatus();
                log('Disconnected from WebSocket', 'info');
            }
        }

        function subscribeToHokmRooms() {
            if (!connected) {
                log('Not connected!', 'error');
                return;
            }

            stompClient.subscribe('/topic/rooms/HOKM', function (message) {
                console.log('Received HOKM room message:', message.body);
                log('HOKM Room message: ' + message.body, 'success');
            });

            log('Subscribed to HOKM rooms', 'info');
        }

        function subscribeToGameRoom() {
            if (!connected) {
                log('Not connected!', 'error');
                return;
            }

            const roomId = document.getElementById('roomId').value || '40';
            stompClient.subscribe('/topic/game/' + roomId, function (message) {
                console.log('Received game message:', message.body);
                log('Game message: ' + message.body, 'success');
            });

            log('Subscribed to game room ' + roomId, 'info');
        }

        function sendTestMessage() {
            if (!connected) {
                log('Not connected!', 'error');
                return;
            }

            stompClient.send("/app/game/action", {}, JSON.stringify({
                action: "SUBSCRIBE_ROOMS",
                gameType: "HOKM"
            }));

            log('Sent subscribe message', 'info');
        }

        function addUserToRoom() {
            // Simulate adding a user to room 40
            log('Simulating user join to room 40...', 'info');
            
            // First get a token
            fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: 'test4@example.com',
                    password: 'password123'
                })
            })
            .then(response => response.json())
            .then(data => {
                log('Got token: ' + data.token.substring(0, 50) + '...', 'success');
                
                // Join room
                return fetch('http://localhost:8080/api/game-room/join', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + data.token
                    },
                    body: JSON.stringify({
                        roomId: 40
                    })
                });
            })
            .then(response => response.json())
            .then(data => {
                log('User joined room: ' + JSON.stringify(data), 'success');
            })
            .catch(error => {
                log('Error adding user to room: ' + error, 'error');
            });
        }

        function createNewRoom() {
            log('Creating new room...', 'info');
            
            fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: 'test1@example.com',
                    password: 'password123'
                })
            })
            .then(response => response.json())
            .then(data => {
                log('Got token for room creation', 'success');
                
                return fetch('http://localhost:8080/api/game-room/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + data.token
                    },
                    body: JSON.stringify({
                        gameType: 'HOKM',
                        roomType: 'PUBLIC',
                        entryFee: 'FIFTY',
                        gameScore: 'HOKM_THREE',
                        maxPlayers: 4
                    })
                });
            })
            .then(response => response.json())
            .then(data => {
                log('Room created: ' + JSON.stringify(data), 'success');
            })
            .catch(error => {
                log('Error creating room: ' + error, 'error');
            });
        }

        function getRoomInfo() {
            const roomId = document.getElementById('roomId').value || '40';
            log('Getting room info for room ' + roomId + '...', 'info');
            
            fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: 'test1@example.com',
                    password: 'password123'
                })
            })
            .then(response => response.json())
            .then(data => {
                return fetch('http://localhost:8080/api/game-room/' + roomId, {
                    headers: {
                        'Authorization': 'Bearer ' + data.token
                    }
                });
            })
            .then(response => response.json())
            .then(data => {
                log('Room info: ' + JSON.stringify(data, null, 2), 'success');
            })
            .catch(error => {
                log('Error getting room info: ' + error, 'error');
            });
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // Auto-connect on page load
        window.onload = function() {
            setTimeout(connect, 1000);
        };
    </script>
</body>
</html>
